<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A2233"/>
      <stop offset="55%" stop-color="#0B0F1A"/>
      <stop offset="100%" stop-color="#07090F"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C275" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C87533" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#F4D38A"/>
      <stop offset="55%" stop-color="#E8C275"/>
      <stop offset="100%" stop-color="#B07835"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.25" r="0.7">
      <stop offset="0%" stop-color="#E8C275" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#E8C275" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- 외곽 골드 링 -->
  <rect x="20" y="20" width="472" height="472" rx="96" fill="none" stroke="url(#ring)" stroke-width="2"/>

  <!-- 메인 글자: 古 (고물의 古) -->
  <text
    x="256" y="358"
    text-anchor="middle"
    font-family="'Noto Sans KR', 'Pretendard', system-ui, sans-serif"
    font-weight="800"
    font-size="320"
    fill="url(#text)"
    letter-spacing="-8">古</text>

  <!-- 하단 라벨 -->
  <text
    x="256" y="450"
    text-anchor="middle"
    font-family="'Pretendard', system-ui, sans-serif"
    font-weight="600"
    font-size="36"
    fill="#E8C275"
    opacity="0.75"
    letter-spacing="14">SCRAP</text>
</svg>
