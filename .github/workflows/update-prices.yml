name: 매일 시세 업데이트

# 매일 새벽 6시(KST) 자동 실행 + 수동 실행 가능
on:
  schedule:
    - cron: '0 21 * * *'   # UTC 21:00 = KST 06:00 (다음날)
  workflow_dispatch:        # GitHub UI에서 "Run workflow" 버튼으로 즉시 실행 가능

# 워크플로가 repo에 commit/push 할 수 있도록 권한 부여
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 셋업
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 크롤러 실행
        run: python crawler/crawler.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "Auto Updater"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            git commit -m "시세 자동 업데이트: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
            git push
          fi
